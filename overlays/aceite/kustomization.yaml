apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/name: zabbix
      app.kubernetes.io/instance: zabbix-aceite
      app.kubernetes.io/component: monitoring
      app.kubernetes.io/part-of: observability
      app.kubernetes.io/managed-by: argocd
      app.kubernetes.io/environment: aceite
    includeSelectors: false

patches:
  - target:
      kind: Deployment
      name: zabbix-web
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ZBX_SSO_SETTINGS
          value: '{"baseurl":"https://zabbix-aceite.apps.example.invalid","use_proxy_headers":true,"strict":true}'
