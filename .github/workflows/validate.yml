name: Validate manifests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - run: pipx run yamllint==1.37.1 -d relaxed .
      - name: Render every Kustomize entry point
        run: |
          find . -name kustomization.yaml -print0 |
            while IFS= read -r -d '' file; do
              kubectl kustomize "$(dirname "$file")" >/dev/null
            done
